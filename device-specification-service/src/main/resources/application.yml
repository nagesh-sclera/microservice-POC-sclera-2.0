server:
  port: 0

spring:
  application:
    name: device-specification-service
  datasource:
    url: jdbc:mysql://localhost:3306/vdms
    username: root
    password: mypass123
    hikari:
      maximum-pool-size: 50
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate.dialect: org.hibernate.dialect.MySQL8Dialect

services:
  device:
    base-url: lb://asset-service
  inventory:
    base-url: lb://inventory-service
  user:
    base-url: lb://user-service
  managed-software:
    base-url: lb://managed-software-service
  webclient:
    connect-timeout: 3000
    read-timeout: 5000

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    registry-fetch-interval-seconds: 5
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 5
    lease-expiration-duration-in-seconds: 15

logging:
  level:
    io.sclera: INFO
