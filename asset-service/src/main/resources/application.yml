server:
  port: 0

spring:
  application:
    name: asset-service
  datasource:
    url: jdbc:mysql://localhost:3306/vdms
    username: root
    password: mypass123
    hikari:
      maximum-pool-size: 50
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate.dialect: org.hibernate.dialect.MySQL8Dialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

logging:
  level:
    io.sclera: INFO
